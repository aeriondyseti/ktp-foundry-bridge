name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Package module
        run: |
          mkdir ktp-foundry-bridge
          cp module.json ktp-foundry-bridge/
          cp -r scripts ktp-foundry-bridge/
          zip -r ktp-foundry-bridge.zip ktp-foundry-bridge/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ktp-foundry-bridge.zip
            module.json
